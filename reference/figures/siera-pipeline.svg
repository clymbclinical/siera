<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="siera pipeline: ARS metadata flows through readARS to generated R scripts, which run against ADaM datasets to produce an ARD">
  <title>The siera pipeline</title>
  <desc>ARS metadata (JSON or XLSX) is read by readARS(), which writes one ARD_Output.R script per output. Each script runs against ADaM datasets to produce an ARD (one row per result). The cards and cardx packages perform the computation.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34495e"/>
    </marker>
  </defs>

  <!-- Box 1: ARS metadata -->
  <rect x="12" y="60" width="160" height="74" rx="9" fill="#eaf2f8" stroke="#2c6e9b" stroke-width="2"/>
  <text x="92" y="92" text-anchor="middle" font-size="17" font-weight="bold" fill="#1b4f72">ARS metadata</text>
  <text x="92" y="113" text-anchor="middle" font-size="13" fill="#34495e">JSON / XLSX</text>

  <!-- arrow 1 -> 2 -->
  <line x1="172" y1="97" x2="214" y2="97" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: readARS() -->
  <rect x="220" y="60" width="140" height="74" rx="9" fill="#2c6e9b" stroke="#1b4f72" stroke-width="2"/>
  <text x="290" y="95" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">readARS()</text>
  <text x="290" y="116" text-anchor="middle" font-size="12" fill="#d6eaf8">siera</text>

  <!-- arrow 2 -> 3 -->
  <line x1="360" y1="97" x2="402" y2="97" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 3: generated scripts -->
  <rect x="408" y="56" width="180" height="82" rx="9" fill="#eaf2f8" stroke="#2c6e9b" stroke-width="2"/>
  <text x="498" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#1b4f72">ARD_&lt;Output&gt;.R</text>
  <text x="498" y="109" text-anchor="middle" font-size="13" fill="#34495e">one script per output</text>

  <!-- arrow 3 -> 4 -->
  <line x1="588" y1="97" x2="630" y2="97" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 4: ARD -->
  <rect x="636" y="60" width="152" height="74" rx="9" fill="#d5f5e3" stroke="#1e8449" stroke-width="2"/>
  <text x="712" y="92" text-anchor="middle" font-size="17" font-weight="bold" fill="#145a32">ARD</text>
  <text x="712" y="113" text-anchor="middle" font-size="12" fill="#1e6b3a">one row per result</text>

  <!-- ADaM feed into box 3 -->
  <rect x="423" y="206" width="150" height="50" rx="9" fill="#fef9e7" stroke="#b7950b" stroke-width="2"/>
  <text x="498" y="230" text-anchor="middle" font-size="15" font-weight="bold" fill="#7d6608">ADaM datasets</text>
  <text x="498" y="247" text-anchor="middle" font-size="11" fill="#9a7d0a">CSV</text>
  <line x1="498" y1="206" x2="498" y2="142" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="178" text-anchor="start" font-size="11" fill="#7d6608" font-style="italic">run script</text>

  <!-- caption -->
  <text x="400" y="290" text-anchor="middle" font-size="13" fill="#566573">The generated scripts use <tspan font-style="italic">cards</tspan> / <tspan font-style="italic">cardx</tspan> to perform the computation.</text>
</svg>
